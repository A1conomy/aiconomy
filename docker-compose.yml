# AIconomy local infrastructure (M0b)
# Run: docker-compose up -d
# Stop: docker-compose down
# Reset data: docker-compose down -v

services:
  postgres:
    image: postgres:16-alpine
    container_name: aiconomy-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aiconomy}
      POSTGRES_USER: ${POSTGRES_USER:-aiconomy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aiconomy} -d ${POSTGRES_DB:-aiconomy}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: aiconomy-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.8.1
    container_name: aiconomy-kafka
    hostname: kafka
    ports:
      # Host apps (Spring, Python on your machine) connect here
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # INTERNAL = other containers; EXTERNAL = localhost on host
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:29092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s

  kafka-init:
    image: apache/kafka:3.8.1
    container_name: aiconomy-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        BOOTSTRAP="kafka:29092"
        create_topic() {
          /opt/kafka/bin/kafka-topics.sh --bootstrap-server "$$BOOTSTRAP" \
            --create --if-not-exists \
            --topic "$$1" --partitions 3 --replication-factor 1
          echo "Topic ready: $$1"
        }
        create_topic tasks.posted
        create_topic tasks.claimed
        create_topic tasks.delivered
        create_topic tasks.accepted
        create_topic tasks.rejected
        create_topic payments.proposed
        create_topic payments.accepted
        create_topic ledger.commands
        create_topic ledger.events
        create_topic macro.snapshots
        create_topic simulation.tick
        echo "All Kafka topics initialized."

volumes:
  postgres_data:
  redis_data:
  kafka_data:
