spring:
  application:
    name: aiconomy-tasks
  profiles:
    active: docker

---
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:aiconomy}
    username: ${POSTGRES_USER:aiconomy}
    password: ${POSTGRES_PASSWORD:change-me}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_tasks_history
    baseline-on-migrate: true
    baseline-version: 0

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: aiconomy-tasks
      auto-offset-reset: earliest
    producer:
      acks: all

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

server:
  port: ${SERVER_PORT:8082}

ledger:
  base-url: ${LEDGER_BASE_URL:http://localhost:8081}

logging:
  level:
    com.aiconomy: INFO
